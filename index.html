<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GZ Lubricantes - Panel Administrador</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #262626; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #dc2626; }
    </style>
</head>
<body class="bg-neutral-950 text-neutral-100 min-h-screen antialiased">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 🔑 CONFIGURACIÓN DE FIREBASE
        // Si tienes tus llaves de Firebase, reemplaza estos textos. Si no, déjalos así para modo local.
        const firebaseConfig = {
            apiKey: "TU_API_KEY_AQUI",
            authDomain: "TU_AUTH_DOMAIN_AQUI",
            projectId: "TU_PROJECT_ID_AQUI",
            storageBucket: "TU_STORAGE_BUCKET_AQUI",
            messagingSenderId: "TU_MESSAGING_SENDER_ID_AQUI",
            appId: "TU_APP_ID_AQUI"
        };

        let db = null;
        if (firebaseConfig.apiKey && firebaseConfig.apiKey !== "TU_API_KEY_AQUI") {
            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
            } catch (error) {
                console.error("Fallo de inicialización:", error);
            }
        }

        function App() {
            const [products, setProducts] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingProduct, setEditingProduct] = useState(null);

            const [formData, setFormData] = useState({
                name: '', brand: '', type: 'Mineral', viscosity: '20W-50', costPrice: '', sellingPrice: '', stock: ''
            });

            useEffect(() => {
                if (db) {
                    const unsubscribe = db.collection('products').onSnapshot((snapshot) => {
                        const pList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setProducts(pList);
                        localStorage.setItem('gz_backup', JSON.stringify(pList));
                    }, () => loadLocalBackup());
                    return () => unsubscribe();
                } else {
                    loadLocalBackup();
                }
            }, []);

            const loadLocalBackup = () => {
                const data = localStorage.getItem('gz_backup');
                if (data) {
                    setProducts(JSON.parse(data));
                } else {
                    const demo = [
                        { id: '1', name: 'Aceite de Motor Premium', brand: 'Shell', type: 'Sintético', viscosity: '10W-30', costPrice: 6.5, sellingPrice: 10.0, stock: 12 },
                        { id: '2', name: 'Lubricante Multigrado', brand: 'Castrol', type: 'Mineral', viscosity: '20W-50', costPrice: 5.0, sellingPrice: 8.5, stock: 3 }
                    ];
                    setProducts(demo);
                    localStorage.setItem('gz_backup', JSON.stringify(demo));
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                const currentData = {
                    name: formData.name,
                    brand: formData.brand,
                    type: formData.type,
                    viscosity: formData.viscosity,
                    costPrice: parseFloat(formData.costPrice) || 0,
                    sellingPrice: parseFloat(formData.sellingPrice) || 0,
                    stock: parseInt(formData.stock) || 0
                };

                if (db) {
                    if (editingProduct) await db.collection('products').doc(editingProduct.id).update(currentData);
                    else await db.collection('products').add(currentData);
                } else {
                    let list = [...products];
                    if (editingProduct) list = list.map(p => p.id === editingProduct.id ? { ...p, ...currentData } : p);
                    else list.push({ id: Date.now().toString(), ...currentData });
                    setProducts(list);
                    localStorage.setItem('gz_backup', JSON.stringify(list));
                }
                closeModal();
            };

            const handleDelete = async (id) => {
                if (!confirm('¿Eliminar este producto?')) return;
                if (db) {
                    await db.collection('products').doc(id).delete();
                } else {
                    const list = products.filter(p => p.id !== id);
                    setProducts(list);
                    localStorage.setItem('gz_backup', JSON.stringify(list));
                }
            };

            const openModal = (product = null) => {
                if (product) {
                    setEditingProduct(product);
                    setFormData({ ...product });
                } else {
                    setEditingProduct(null);
                    setFormData({ name: '', brand: '', type: 'Mineral', viscosity: '20W-50', costPrice: '', sellingPrice: '', stock: '' });
                }
                setIsModalOpen(true);
            };

            const closeModal = () => { setIsModalOpen(false); setEditingProduct(null); };

            const filtered = useMemo(() => {
                return products.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.brand.toLowerCase().includes(searchQuery.toLowerCase()));
            }, [products, searchQuery]);

            const metrics = useMemo(() => {
                return {
                    total: products.length,
                    low: products.filter(p => p.stock <= 5).length,
                    value: products.reduce((acc, p) => acc + (p.sellingPrice * p.stock), 0)
                };
            }, [products]);

            return (
                <div class="flex flex-col min-h-screen">
                    <header class="bg-neutral-900 border-b border-neutral-800 px-6 py-4 flex items-center justify-between sticky top-0 z-40">
                        <div class="flex items-center gap-3">
                            <div class="bg-red-600 text-white font-black px-3 py-1 rounded text-xl tracking-tighter">GZ</div>
                            <span class="font-bold text-lg tracking-wide uppercase text-neutral-200">Lubricantes</span>
                        </div>
                        <div class="flex items-center gap-2 text-sm text-neutral-400">
                            <i class="fa-solid fa-circle text-emerald-500 text-[10px] animate-pulse"></i>
                            <span>Consola Lista</span>
                        </div>
                    </header>

                    <main class="flex-1 p-6 max-w-7xl w-full mx-auto">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                            <div class="bg-neutral-900 border border-neutral-800 p-5 rounded-xl flex items-center justify-between">
                                <div><p class="text-xs text-neutral-400 uppercase">Productos</p><h3 class="text-3xl font-bold mt-1">{metrics.total}</h3></div>
                                <div class="bg-neutral-800 p-3 rounded-lg"><i class="fa-solid fa-boxes-stacked text-xl"></i></div>
                            </div>
                            <div class="bg-neutral-900 border border-neutral-800 p-5 rounded-xl flex items-center justify-between">
                                <div><p class="text-xs text-neutral-400 uppercase">Bajo Stock</p><h3 class="text-3xl font-bold mt-1 text-red-500">{metrics.low}</h3></div>
                                <div class="bg-neutral-800 p-3 rounded-lg text-red-400"><i class="fa-solid fa-triangle-exclamation text-xl"></i></div>
                            </div>
                            <div class="bg-neutral-900 border border-neutral-800 p-5 rounded-xl flex items-center justify-between">
                                <div><p class="text-xs text-neutral-400 uppercase">Valor Capital</p><h3 class="text-3xl font-bold mt-1 text-emerald-500">${metrics.value.toFixed(2)}</h3></div>
                                <div class="bg-neutral-800 p-3 rounded-lg text-emerald-400"><i class="fa-solid fa-dollar-sign text-xl"></i></div>
                            </div>
                        </div>

                        <div class="bg-neutral-900 border border-neutral-800 p-4 rounded-xl flex flex-col sm:flex-row items-center justify-between gap-4 mb-6">
                            <div class="relative w-full sm:w-80">
                                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-neutral-500 text-sm"></i>
                                <input type="text" placeholder="Buscar producto..." class="w-full bg-neutral-950 border border-neutral-800 rounded-lg pl-9 pr-4 py-2 text-sm text-neutral-200 focus:outline-none focus:border-red-600" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                            </div>
                            <button onClick={() => openModal()} class="w-full sm:w-auto bg-red-600 hover:bg-red-700 text-white font-medium text-sm px-4 py-2 rounded-lg flex items-center justify-center gap-2 transition-colors">
                                <i class="fa-solid fa-plus text-xs"></i> Agregar Producto
                            </button>
                        </div>

                        <div class="bg-neutral-900 border border-neutral-800 rounded-xl overflow-hidden">
                            <div class="overflow-x-auto">
                                <table class="w-full text-left border-collapse">
                                    <thead>
                                        <tr class="bg-neutral-950 border-b border-neutral-800 text-xs font-semibold text-neutral-400 uppercase">
                                            <th class="px-6 py-4">Descripción</th>
                                            <th class="px-6 py-4">Marca</th>
                                            <th class="px-6 py-4 text-center">Stock</th>
                                            <th class="px-6 py-4 text-right">Costo</th>
                                            <th class="px-6 py-4 text-right">Venta</th>
                                            <th class="px-6 py-4 text-center">Acciones</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-neutral-800 text-sm">
                                        {filtered.length > 0 ? (
                                            filtered.map((p) => (
                                                <tr key={p.id} class="hover:bg-neutral-800/30">
                                                    <td class="px-6 py-4 font-medium text-white">{p.name} <span class="text-xs text-red-400 font-mono block">{p.viscosity} ({p.type})</span></td>
                                                    <td class="px-6 py-4"><span class="bg-neutral-800 px-2 py-0.5 rounded text-xs border border-neutral-700">{p.brand}</span></td>
                                                    <td class="px-6 py-4 text-center"><span class={`px-2 py-0.5 rounded text-xs font-bold ${p.stock <= 5 ? 'bg-red-950 text-red-400' : 'bg-neutral-950'}`}>{p.stock} und</span></td>
                                                    <td class="px-6 py-4 text-right font-mono">${p.costPrice.toFixed(2)}</td>
                                                    <td class="px-6 py-4 text-right font-mono text-emerald-400 font-medium">${p.sellingPrice.toFixed(2)}</td>
                                                    <td class="px-6 py-4 text-center">
                                                        <button onClick={() => openModal(p)} class="p-1.5 text-neutral-400 hover:text-white mr-2"><i class="fa-solid fa-pen-to-square"></i></button>
                                                        <button onClick={() => handleDelete(p.id)} class="p-1.5 text-neutral-500 hover:text-red-400"><i class="fa-solid fa-trash-can"></i></button>
                                                    </td>
                                                </tr>
                                            ))
                                        ) : (
                                            <tr><td colSpan="6" class="px-6 py-12 text-center text-neutral-500">No hay productos registrados.</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </main>

                    {isModalOpen && (
                        <div class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div class="bg-neutral-900 border border-neutral-800 w-full max-w-md rounded-xl overflow-hidden">
                                <div class="bg-neutral-950 px-6 py-4 border-b border-neutral-800 flex items-center justify-between">
                                    <h3 class="font-bold text-white">{editingProduct ? 'Editar Producto' : 'Nuevo Producto'}</h3>
                                    <button onClick={closeModal} class="text-neutral-500 hover:text-neutral-200"><i class="fa-solid fa-xmark"></i></button>
                                </div>
                                <form onSubmit={handleSubmit} class="p-6 space-y-4">
                                    <div>
                                        <label class="block text-xs font-medium text-neutral-400 uppercase mb-1">Nombre</label>
                                        <input type="text" required class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-3 py-2 text-sm text-neutral-200 focus:outline-none focus:border-red-600" value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} />
                                    </div>
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-xs font-medium text-neutral-400 uppercase mb-1">Marca</label>
                                            <input type="text" required class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-3 py-2 text-sm text-neutral-200 focus:outline-none focus:border-red-600" value={formData.brand} onChange={(e) => setFormData({...formData, brand: e.target.value})} />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-medium text-neutral-400 uppercase mb-1">Viscosidad</label>
                                            <input type="text" required class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-3 py-2 text-sm font-mono text-neutral-200 focus:outline-none focus:border-red-600" value={formData.viscosity} onChange={(e) => setFormData({...formData, viscosity: e.target.value})} />
                                        </div>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-medium text-neutral-400 uppercase mb-1">Base</label>
                                        <select class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-3 py-2 text-sm text-neutral-200 focus:outline-none focus:border-red-600" value={formData.type} onChange={(e) => setFormData({...formData, type: e.target.value})}>
                                            <option value="Mineral">Mineral</option>
                                            <option value="Semisintético">Semisintético</option>
                                            <option value="Sintético">Sintético</option>
                                        </select>
                                    </div>
                                    <div class="grid grid-cols-3 gap-4">
                                        <div>
                                            <label class="block text-xs font-medium text-neutral-400 uppercase mb-1">Costo ($)</label>
                                            <input type="number" step="0.01" required class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-3 py-2 text-sm font-mono text-neutral-200 focus:outline-none focus:border-red-600" value={formData.costPrice} onChange={(e) => setFormData({...formData, costPrice: e.target.value})} />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-medium text-neutral-400 uppercase mb-1">Venta ($)</label>
                                            <input type="number" step="0.01" required class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-3 py-2 text-sm font-mono text-neutral-200 focus:outline-none focus:border-red-600" value={formData.sellingPrice} onChange={(e) => setFormData({...formData, sellingPrice: e.target.value})} />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-medium text-neutral-400 uppercase mb-1">Stock</label>
                                            <input type="number" required class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-3 py-2 text-sm text-neutral-200 focus:outline-none focus:border-red-600" value={formData.stock} onChange={(e) => setFormData({...formData, stock: e.target.value})} />
                                        </div>
                                    </div>
                                    <div class="pt-4 flex justify-end gap-3 border-t border-neutral-800">
                                        <button type="button" onClick={closeModal} class="px-4 py-2 border border-neutral-800 rounded-lg text-sm text-neutral-400 hover:bg-neutral-950">Cancelar</button>
                                        <button type="submit" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white font-medium text-sm rounded-lg">Guardar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
