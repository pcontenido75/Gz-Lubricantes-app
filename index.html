<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GZ Lubricantes - Panel Profesional</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #262626; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #dc2626; }
    </style>
</head>
<body class="bg-neutral-950 text-neutral-100 min-h-screen antialiased">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 🔑 CONFIGURACIÓN DE FIREBASE
        const firebaseConfig = {
            apiKey: "TU_API_KEY_AQUI",
            authDomain: "TU_AUTH_DOMAIN_AQUI",
            projectId: "TU_PROJECT_ID_AQUI",
            storageBucket: "TU_STORAGE_BUCKET_AQUI",
            messagingSenderId: "TU_MESSAGING_SENDER_ID_AQUI",
            appId: "TU_APP_ID_AQUI"
        };

        let db = null;
        if (firebaseConfig.apiKey && firebaseConfig.apiKey !== "TU_API_KEY_AQUI") {
            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
            } catch (error) {
                console.error("Fallo de inicialización Firebase:", error);
            }
        }

        function App() {
            const [products, setProducts] = useState([]);
            const [sales, setSales] = useState([]);
            const [activeTab, setActiveTab] = useState('inventory'); // 'inventory' o 'history'
            const [searchQuery, setSearchQuery] = useState('');
            
            // Modales
            const [isProductModalOpen, setIsProductModalOpen] = useState(false);
            const [isSaleModalOpen, setIsSaleModalOpen] = useState(false);
            const [editingProduct, setEditingProduct] = useState(null);
            const [selectedProductForSale, setSelectedProductForSale] = useState(null);

            // Formularios
            const [productForm, setProductForm] = useState({
                name: '', brand: '', type: 'Mineral', viscosity: '20W-50', costPrice: '', sellingPrice: '', stock: ''
            });
            const [saleQty, setSaleQty] = useState(1);

            // Carga inicial y sincronización de datos
            useEffect(() => {
                if (db) {
                    const unsubProducts = db.collection('products').onSnapshot((snapshot) => {
                        const list = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setProducts(list);
                        localStorage.setItem('gz_products', JSON.stringify(list));
                    }, () => loadLocalProducts());

                    const unsubSales = db.collection('sales').onSnapshot((snapshot) => {
                        const list = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setSales(list);
                        localStorage.setItem('gz_sales', JSON.stringify(list));
                    }, () => loadLocalSales());

                    return () => { unsubProducts(); unsubSales(); };
                } else {
                    loadLocalProducts();
                    loadLocalSales();
                }
            }, []);

            const loadLocalProducts = () => {
                const data = localStorage.getItem('gz_products');
                if (data) {
                    setProducts(JSON.parse(data));
                } else {
                    const demoProducts = [
                        { id: '1', name: 'Ultra Motor Oil', brand: 'Castrol', type: 'Semisintético', viscosity: '10W-40', costPrice: 5.50, sellingPrice: 9.00, stock: 20 },
                        { id: '2', name: 'Helix Protect', brand: 'Shell', type: 'Sintético', viscosity: '5W-30', costPrice: 7.00, sellingPrice: 12.50, stock: 4 },
                        { id: '3', name: 'High Mileage Class', brand: 'Inca', type: 'Mineral', viscosity: '20W-50', costPrice: 4.00, sellingPrice: 7.00, stock: 15 }
                    ];
                    setProducts(demoProducts);
                    localStorage.setItem('gz_products', JSON.stringify(demoProducts));
                }
            };

            const loadLocalSales = () => {
                const data = localStorage.getItem('gz_sales');
                if (data) {
                    setSales(JSON.parse(data));
                } else {
                    // Datos demo de los últimos 7 días para activar los gráficos de inmediato
                    const demoSales = [
                        { id: 's1', productName: 'Ultra Motor Oil', brand: 'Castrol', viscosity: '10W-40', quantity: 2, total: 18.00, profit: 7.00, date: new Date(Date.now() - 24*60*60*1000).toISOString() },
                        { id: 's2', productName: 'High Mileage Class', brand: 'Inca', viscosity: '20W-50', quantity: 3, total: 21.00, profit: 9.00, date: new Date(Date.now() - 3*24*60*60*1000).toISOString() }
                    ];
                    setSales(demoSales);
                    localStorage.setItem('gz_sales', JSON.stringify(demoSales));
                }
            };

            // Métricas y Contabilidad Avanzada (Ventas Semanales y Ganancias)
            const metrics = useMemo(() => {
                const oneWeekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
                const weeklyRecords = sales.filter(s => new Date(s.date).getTime() > oneWeekAgo);

                const totalWeeklySales = weeklyRecords.reduce((acc, s) => acc + s.total, 0);
                const totalWeeklyProfit = weeklyRecords.reduce((acc, s) => acc + s.profit, 0);
                const totalCapital = products.reduce((acc, p) => acc + (p.costPrice * p.stock), 0);
                const lowStockCount = products.filter(p => p.stock <= 5).length;

                return {
                    capital: totalCapital,
                    weeklySales: totalWeeklySales,
                    weeklyProfit: totalWeeklyProfit,
                    lowStock: lowStockCount,
                    totalItems: products.length
                };
            }, [products, sales]);

            // CRUD Productos
            const handleProductSubmit = async (e) => {
                e.preventDefault();
                const data = {
                    name: productForm.name,
                    brand: productForm.brand,
                    type: productForm.type,
                    viscosity: productForm.viscosity,
                    costPrice: parseFloat(productForm.costPrice) || 0,
                    sellingPrice: parseFloat(productForm.sellingPrice) || 0,
                    stock: parseInt(productForm.stock) || 0
                };

                if (db) {
                    if (editingProduct) await db.collection('products').doc(editingProduct.id).update(data);
                    else await db.collection('products').add(data);
                } else {
                    let list = [...products];
                    if (editingProduct) list = list.map(p => p.id === editingProduct.id ? { ...p, ...data } : p);
                    else list.push({ id: Date.now().toString(), ...data });
                    setProducts(list);
                    localStorage.setItem('gz_products', JSON.stringify(list));
                }
                closeProductModal();
            };

            const handleProductDelete = async (id) => {
                if (!confirm('¿Seguro que deseas eliminar este lubricante del inventario?')) return;
                if (db) {
                    await db.collection('products').doc(id).delete();
                } else {
                    const list = products.filter(p => p.id !== id);
                    setProducts(list);
                    localStorage.setItem('gz_products', JSON.stringify(list));
                }
            };

            // Lógica del Módulo de Ventas
            const openSaleModal = (product) => {
                setSelectedProductForSale(product);
                setSaleQty(1);
                setIsSaleModalOpen(true);
            };

            const handleExecuteSale = async (e) => {
                e.preventDefault();
                if (!selectedProductForSale || selectedProductForSale.stock < saleQty) {
                    alert('Acción denegada: Stock insuficiente para realizar la venta.');
                    return;
                }

                const finalSaleTotal = selectedProductForSale.sellingPrice * saleQty;
                const finalCostTotal = selectedProductForSale.costPrice * saleQty;
                const finalProfit = finalSaleTotal - finalCostTotal;

                const saleRecord = {
                    productId: selectedProductForSale.id,
                    productName: selectedProductForSale.name,
                    brand: selectedProductForSale.brand,
                    viscosity: selectedProductForSale.viscosity,
                    quantity: parseInt(saleQty),
                    total: finalSaleTotal,
                    profit: finalProfit,
                    date: new Date().toISOString()
                };

                const absoluteNewStock = selectedProductForSale.stock - saleQty;

                if (db) {
                    await db.collection('sales').add(saleRecord);
                    await db.collection('products').doc(selectedProductForSale.id).update({ stock: absoluteNewStock });
                } else {
                    const updatedSales = [saleRecord, ...sales];
                    setSales(updatedSales);
                    localStorage.setItem('gz_sales', JSON.stringify(updatedSales));

                    const updatedProducts = products.map(p => p.id === selectedProductForSale.id ? { ...p, stock: absoluteNewStock } : p);
                    setProducts(updatedProducts);
                    localStorage.setItem('gz_products', JSON.stringify(updatedProducts));
                }

                setIsSaleModalOpen(false);
                setSelectedProductForSale(null);
            };

            const openProductModal = (product = null) => {
                if (product) {
                    setEditingProduct(product);
                    setProductForm({ ...product });
                } else {
                    setEditingProduct(null);
                    setProductForm({ name: '', brand: '', type: 'Mineral', viscosity: '20W-50', costPrice: '', sellingPrice: '', stock: '' });
                }
                setIsProductModalOpen(true);
            };

            const closeProductModal = () => { setIsProductModalOpen(false); setEditingProduct(null); };

            const filteredProducts = useMemo(() => {
                return products.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.brand.toLowerCase().includes(searchQuery.toLowerCase()));
            }, [products, searchQuery]);

            return (
                <div class="flex flex-col min-h-screen">
                    {/* Header */}
                    <header class="bg-neutral-900 border-b border-neutral-800 px-6 py-4 flex items-center justify-between sticky top-0 z-40">
                        <div class="flex items-center gap-3">
                            <div class="bg-red-600 text-white font-black px-3 py-1 rounded text-xl tracking-tighter">GZ</div>
                            <span class="font-bold text-lg tracking-wide uppercase text-neutral-200">Lubricantes</span>
                        </div>
                        <div class="flex gap-4">
                            <button onClick={() => setActiveTab('inventory')} class={`px-3 py-1.5 rounded-lg text-sm font-medium transition-colors ${activeTab === 'inventory' ? 'bg-neutral-800 text-white border border-neutral-700' : 'text-neutral-400 hover:text-white'}`}>
                                <i class="fa-solid fa-boxes-stacked mr-2"></i>Inventario
                            </button>
                            <button onClick={() => setActiveTab('history')} class={`px-3 py-1.5 rounded-lg text-sm font-medium transition-colors ${activeTab === 'history' ? 'bg-neutral-800 text-white border border-neutral-700' : 'text-neutral-400 hover:text-white'}`}>
                                <i class="fa-solid fa-chart-line mr-2"></i>Ventas e Historial
                            </button>
                        </div>
                    </header>

                    {/* Dashboard Metricas Principales (RESTAURADO) */}
                    <main class="flex-1 p-6 max-w-7xl w-full mx-auto">
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                            <div class="bg-neutral-900 border border-neutral-800 p-5 rounded-xl flex items-center justify-between">
                                <div><p class="text-xs text-neutral-400 uppercase font-medium tracking-wider">Inversión Stock</p><h3 class="text-2xl font-bold mt-1 text-neutral-200">${metrics.capital.toFixed(2)}</h3></div>
                                <div class="bg-neutral-950 p-3 rounded-lg border border-neutral-800 text-blue-400"><i class="fa-solid fa-wallet text-lg"></i></div>
                            </div>
                            <div class="bg-neutral-900 border border-neutral-800 p-5 rounded-xl flex items-center justify-between">
                                <div><p class="text-xs text-neutral-400 uppercase font-medium tracking-wider">Ventas de la Semana</p><h3 class="text-2xl font-bold mt-1 text-emerald-400">${metrics.weeklySales.toFixed(2)}</h3></div>
                                <div class="bg-neutral-950 p-3 rounded-lg border border-neutral-800 text-emerald-400"><i class="fa-solid fa-cash-register text-lg"></i></div>
                            </div>
                            <div class="bg-neutral-900 border border-neutral-800 p-5 rounded-xl flex items-center justify-between">
                                <div><p class="text-xs text-neutral-400 uppercase font-medium tracking-wider">Ganancias Netas (7d)</p><h3 class="text-2xl font-bold mt-1 text-cyan-400">${metrics.weeklyProfit.toFixed(2)}</h3></div>
                                <div class="bg-neutral-950 p-3 rounded-lg border border-neutral-800 text-cyan-400"><i class="fa-solid fa-money-bill-trend-up text-lg"></i></div>
                            </div>
                            <div class="bg-neutral-900 border border-neutral-800 p-5 rounded-xl flex items-center justify-between">
                                <div><p class="text-xs text-neutral-400 uppercase font-medium tracking-wider">Alertas Bajo Stock</p><h3 class="text-2xl font-bold mt-1 text-red-500">{metrics.lowStock}</h3></div>
                                <div class="bg-neutral-950 p-3 rounded-lg border border-neutral-800 text-red-500"><i class="fa-solid fa-triangle-exclamation text-lg"></i></div>
                            </div>
                        </div>

                        {/* Vista 1: Gestión de Inventario */}
                        {activeTab === 'inventory' && (
                            <div>
                                <div class="bg-neutral-900 border border-neutral-800 p-4 rounded-xl flex flex-col sm:flex-row items-center justify-between gap-4 mb-6">
                                    <div class="relative w-full sm:w-80">
                                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-neutral-500 text-sm"></i>
                                        <input type="text" placeholder="Buscar por nombre o marca..." class="w-full bg-neutral-950 border border-neutral-800 rounded-lg pl-9 pr-4 py-2 text-sm text-neutral-200 focus:outline-none focus:border-red-600" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                                    </div>
                                    <button onClick={() => openProductModal()} class="w-full sm:w-auto bg-red-600 hover:bg-red-700 text-white font-medium text-sm px-4 py-2 rounded-lg flex items-center justify-center gap-2 transition-colors">
                                        <i class="fa-solid fa-plus text-xs"></i> Agregar al Inventario
                                    </button>
                                </div>

                                <div class="bg-neutral-900 border border-neutral-800 rounded-xl overflow-hidden">
                                    <div class="overflow-x-auto">
                                        <table class="w-full text-left border-collapse">
                                            <thead>
                                                <tr class="bg-neutral-950 border-b border-neutral-800 text-xs font-semibold text-neutral-400 uppercase">
                                                    <th class="px-6 py-4">Producto / Detalles</th>
                                                    <th class="px-6 py-4">Marca</th>
                                                    <th class="px-6 py-4 text-center">Disponibilidad</th>
                                                    <th class="px-6 py-4 text-right">Costo</th>
                                                    <th class="px-6 py-4 text-right">P. Venta</th>
                                                    <th class="px-6 py-4 text-center">Acciones del Sistema</th>
                                                </tr>
                                            </thead>
                                            <tbody class="divide-y divide-neutral-800 text-sm">
                                                {filteredProducts.length > 0 ? (
                                                    filteredProducts.map((p) => (
                                                        <tr key={p.id} class="hover:bg-neutral-800/20">
                                                            <td class="px-6 py-4 font-medium text-white">
                                                                {p.name} 
                                                                <span class="text-xs text-neutral-400 font-mono block mt-0.5">{p.viscosity} — {p.type}</span>
                                                            </td>
                                                            <td class="px-6 py-4">
                                                                <span class="bg-neutral-950 px-2.5 py-1 rounded text-xs border border-neutral-800 font-medium text-neutral-300">{p.brand}</span>
                                                            </td>
                                                            <td class="px-6 py-4 text-center">
                                                                <span class={`px-2.5 py-0.5 rounded text-xs font-bold ${p.stock <= 5 ? 'bg-red-950/60 text-red-400 border border-red-900' : 'bg-neutral-950 text-neutral-400'}`}>
                                                                    {p.stock} und
                                                                </span>
                                                            </td>
                                                            <td class="px-6 py-4 text-right font-mono text-neutral-400">${p.costPrice.toFixed(2)}</td>
                                                            <td class="px-6 py-4 text-right font-mono text-emerald-400 font-semibold">${p.sellingPrice.toFixed(2)}</td>
                                                            <td class="px-6 py-4 text-center space-x-1">
                                                                <button onClick={() => openSaleModal(p)} class="bg-emerald-950/80 text-emerald-400 hover:bg-emerald-900 border border-emerald-900 px-3 py-1 rounded text-xs font-semibold transition-colors">
                                                                    <i class="fa-solid fa-cart-shopping mr-1.5"></i>Vender
                                                                </button>
                                                                <button onClick={() => openProductModal(p)} class="p-1.5 text-neutral-400 hover:text-white" title="Editar"><i class="fa-solid fa-pen-to-square"></i></button>
                                                                <button onClick={() => handleProductDelete(p.id)} class="p-1.5 text-neutral-500 hover:text-red-400" title="Eliminar"><i class="fa-solid fa-trash-can"></i></button>
                                                            </td>
                                                        </tr>
                                                    ))
                                                ) : (
                                                    <tr><td colSpan="6" class="px-6 py-12 text-center text-neutral-500">No se encontraron lubricantes registrados.</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Vista 2: Historial de Ventas y Finanzas (RESTAURADO) */}
                        {activeTab === 'history' && (
                            <div class="space-y-6">
                                <div class="bg-neutral-900 border border-neutral-800 p-5 rounded-xl">
                                    <h3 class="font-bold text-base text-neutral-200 mb-4 flex items-center gap-2">
                                        <i class="fa-solid fa-clock-rotate-left text-red-500"></i> Auditoría de Ventas Realizadas
                                    </h3>
                                    <div class="overflow-x-auto">
                                        <table class="w-full text-left border-collapse text-sm">
                                            <thead>
                                                <tr class="bg-neutral-950 border-b border-neutral-800 text-xs font-semibold text-neutral-400 uppercase">
                                                    <th class="px-4 py-3">Fecha / Hora</th>
                                                    <th class="px-4 py-3">Descripción de Producto</th>
                                                    <th class="px-4 py-3 text-center">Cant.</th>
                                                    <th class="px-4 py-3 text-right">Total Cobrado</th>
                                                    <th class="px-4 py-3 text-right">Ganancia Neta</th>
                                                </tr>
                                            </thead>
                                            <tbody class="divide-y divide-neutral-800">
                                                {sales.length > 0 ? (
                                                    sales.map((s) => (
                                                        <tr key={s.id} class="hover:bg-neutral-800/10">
                                                            <td class="px-4 py-3 font-mono text-xs text-neutral-500">
                                                                {new Date(s.date).toLocaleString('es-VE')}
                                                            </td>
                                                            <td class="px-4 py-3 font-medium text-neutral-200">
                                                                {s.productName} <span class="text-xs text-neutral-400 font-mono">({s.viscosity} / {s.brand})</span>
                                                            </td>
                                                            <td class="px-4 py-3 text-center font-semibold text-neutral-300">{s.quantity} u</td>
                                                            <td class="px-4 py-3 text-right font-mono text-emerald-400 font-medium">${s.total.toFixed(2)}</td>
                                                            <td class="px-4 py-3 text-right font-mono text-cyan-400 font-medium">${s.profit.toFixed(2)}</td>
                                                        </tr>
                                                    ))
                                                ) : (
                                                    <tr><td colSpan="5" class="px-4 py-8 text-center text-neutral-500">Aún no registras ninguna venta en este periodo.</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* MODAL: REGISTRAR VENTA (RESTAURADO) */}
                    {isSaleModalOpen && selectedProductForSale && (
                        <div class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div class="bg-neutral-900 border border-neutral-800 w-full max-w-sm rounded-xl overflow-hidden shadow-2xl">
                                <div class="bg-neutral-950 px-5 py-4 border-b border-neutral-800 flex items-center justify-between">
                                    <h3 class="font-bold text-white flex items-center gap-2 text-sm uppercase tracking-wide">
                                        <i class="fa-solid fa-cart-plus text-emerald-500"></i> Registrar Salida / Venta
                                    </h3>
                                    <button onClick={() => setIsSaleModalOpen(false)} class="text-neutral-500 hover:text-neutral-200"><i class="fa-solid fa-xmark"></i></button>
                                </div>
                                <form onSubmit={handleExecuteSale} class="p-5 space-y-4">
                                    <div class="bg-neutral-950 p-3 rounded-lg border border-neutral-800">
                                        <p class="text-xs text-neutral-400 font-medium uppercase">Lubricante</p>
                                        <p class="text-base font-bold text-white mt-0.5">{selectedProductForSale.name}</p>
                                        <p class="text-xs font-mono text-neutral-400 mt-0.5">{selectedProductForSale.brand} | {selectedProductForSale.viscosity}</p>
                                        <div class="flex justify-between items-center mt-3 pt-2.5 border-t border-neutral-900 text-xs">
                                            <span class="text-neutral-400">Stock Actual: <b class="text-neutral-200">{selectedProductForSale.stock} u</b></span>
                                            <span class="text-neutral-400">Precio unitario: <b class="text-emerald-400">${selectedProductForSale.sellingPrice.toFixed(2)}</b></span>
                                        </div>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-neutral-400 uppercase mb-1">Cantidad a Vender</label>
                                        <input type="number" min="1" max={selectedProductForSale.stock} required class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-3 py-2 text-sm text-neutral-200 font-bold focus:outline-none focus:border-emerald-600 text-center" value={saleQty} onChange={(e) => setSaleQty(e.target.value)} />
                                    </div>
                                    <div class="bg-neutral-950/40 p-3 rounded-lg border border-neutral-850 space-y-1.5 text-xs font-mono">
                                        <div class="flex justify-between text-neutral-400"><span>Monto bruto:</span><span>${(selectedProductForSale.sellingPrice * saleQty).toFixed(2)}</span></div>
                                        <div class="flex justify-between text-cyan-400 font-medium"><span>Ganancia estimada:</span><span>+${((selectedProductForSale.sellingPrice - selectedProductForSale.costPrice) * saleQty).toFixed(2)}</span></div>
                                    </div>
                                    <div class="pt-2 flex gap-3">
                                        <button type="button" onClick={() => setIsSaleModalOpen(false)} class="flex-1 py-2 border border-neutral-800 rounded-lg text-sm text-neutral-400 hover:bg-neutral-950 transition-colors">Cancelar</button>
                                        <button type="submit" class="flex-1 py-2 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold text-sm rounded-lg transition-colors">Procesar Venta</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL: AGREGAR / EDICIÓN LUBRICANTE */}
                    {isProductModalOpen && (
                        <div class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div class="bg-neutral-900 border border-neutral-800 w-full max-w-md rounded-xl overflow-hidden shadow-2xl">
                                <div class="bg-neutral-950 px-6 py-4 border-b border-neutral-800 flex items-center justify-between">
                                    <h3 class="font-bold text-white text-sm uppercase tracking-wide">{editingProduct ? 'Modificar Especificaciones' : 'Ingresar Nuevo Producto'}</h3>
                                    <button onClick={closeProductModal} class="text-neutral-500 hover:text-neutral-200"><i class="fa-solid fa-xmark"></i></button>
                                </div>
                                <form onSubmit={handleProductSubmit} class="p-6 space-y-4">
                                    <div>
                                        <label class="block text-xs font-medium text-neutral-400 uppercase mb-1">Nombre Comercial</label>
                                        <input type="text" required placeholder="Ej. Helix Ultra o Premium Fluid" class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-3 py-2 text-sm text-neutral-200 focus:outline-none focus:border-red-600" value={productForm.name} onChange={(e) => setProductForm({...productForm, name: e.target.value})} />
                                    </div>
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-xs font-medium text-neutral-400 uppercase mb-1">Marca</label>
                                            <input type="text" required placeholder="Shell, Castrol, Mobil..." class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-3 py-2 text-sm text-neutral-200 focus:outline-none focus:border-red-600" value={productForm.brand} onChange={(e) => setProductForm({...productForm, brand: e.target.value})} />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-medium text-neutral-400 uppercase mb-1">Viscosidad</label>
                                            <input type="text" required placeholder="20W-50 / 15W-40" class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-3 py-2 text-sm font-mono text-neutral-200 focus:outline-none focus:border-red-600" value={productForm.viscosity} onChange={(e) => setProductForm({...productForm, viscosity: e.target.value})} />
                                        </div>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-medium text-neutral-400 uppercase mb-1">Tipo de Base</label>
                                        <select class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-3 py-2 text-sm text-neutral-200 focus:outline-none focus:border-red-600" value={productForm.type} onChange={(e) => setProductForm({...productForm, type: e.target.value})}>
                                            <option value="Mineral">Mineral</option>
                                            <option value="Semisintético">Semisintético</option>
                                            <option value="Sintético">Sintético</option>
                                        </select>
                                    </div>
                                    <div class="grid grid-cols-3 gap-4">
                                        <div>
                                            <label class="block text-xs font-medium text-neutral-400 uppercase mb-1">Costo Fob ($)</label>
                                            <input type="number" step="0.01" required placeholder="0.00" class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-3 py-2 text-sm font-mono text-neutral-200 focus:outline-none focus:border-red-600" value={productForm.costPrice} onChange={(e) => setProductForm({...productForm, costPrice: e.target.value})} />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-medium text-neutral-400 uppercase mb-1">P. Público ($)</label>
                                            <input type="number" step="0.01" required placeholder="0.00" class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-3 py-2 text-sm font-mono text-neutral-200 focus:outline-none focus:border-red-600" value={productForm.sellingPrice} onChange={(e) => setProductForm({...productForm, sellingPrice: e.target.value})} />
                                        </div>
                                        <div>
                                            <label class="block text-xs font-medium text-neutral-400 uppercase mb-1">Unidades</label>
                                            <input type="number" required placeholder="0" class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-3 py-2 text-sm text-neutral-200 focus:outline-none focus:border-red-600" value={productForm.stock} onChange={(e) => setProductForm({...productForm, stock: e.target.value})} />
                                        </div>
                                    </div>
                                    <div class="pt-4 flex justify-end gap-3 border-t border-neutral-800">
                                        <button type="button" onClick={closeProductModal} class="px-4 py-2 border border-neutral-800 rounded-lg text-sm text-neutral-400 hover:bg-neutral-950 transition-colors">Cancelar</button>
                                        <button type="submit" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white font-medium text-sm rounded-lg transition-colors">Establecer Ficha</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
