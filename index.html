<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GZ Lubricantes - Panel Administrativo</title>
  
  <!-- Tailwind CSS para Estilos Modernos -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel para procesar React y JSX en vivo desde el móvil -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Mapeo de Módulos (Importmap) para Firebase y React -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "firebase/app": "https://esm.sh/firebase@10.8.0/app",
        "firebase/auth": "https://esm.sh/firebase@10.8.0/auth",
        "firebase/firestore": "https://esm.sh/firebase@10.8.0/firestore"
      }
    }
  </script>
</head>
<body class="bg-neutral-950 text-neutral-100 antialiased">

  <!-- Contenedor Raíz de React -->
  <div id="root"></div>

  <!-- Código de la Aplicación -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
    import { getFirestore, doc, setDoc, collection, onSnapshot, addDoc, updateDoc, deleteDoc } from 'firebase/firestore';

    // --- CONFIGURACIÓN DE FIREBASE CON SEGURO ANTI-FALLOS ---
    let firebaseConfig = {
      apiKey: "FailsafeKeyForPreviewOnly",
      authDomain: "gz-lubricantes.firebaseapp.com",
      projectId: "gz-lubricantes",
      storageBucket: "gz-lubricantes.appspot.com",
      messagingSenderId: "000000000",
      appId: "1:000000000:web:000000"
    };

    try {
      if (typeof __firebase_config !== 'undefined') {
        firebaseConfig = JSON.parse(__firebase_config);
      }
    } catch (e) {
      console.warn("Usando credenciales de prueba locales.");
    }

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'gz-lubricantes-app';

    const CATEGORIES = ['Aceites Sintéticos', 'Aceites Semi-Sintéticos', 'Aceites Minerales', 'Líquidos de Freno', 'Grasas y Aditivos', 'Transmisión y Engranajes', 'Filtros', 'Otros'];
    const CURRENCIES = [
      { code: 'USD', name: 'Dólares ($)', symbol: '$' },
      { code: 'VES', name: 'Bolívares (Bs)', symbol: 'Bs' },
      { code: 'EUR', name: 'Euros (€)', symbol: '€' }
    ];

    function App() {
      const [user, setUser] = useState(null);
      const [products, setProducts] = useState([]);
      const [sales, setSales] = useState([]);
      const [loading, setLoading] = useState(true);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [searchQuery, setSearchQuery] = useState('');
      const [categoryFilter, setCategoryFilter] = useState('');
      
      const [showProductModal, setShowProductModal] = useState(false);
      const [editingProduct, setEditingProduct] = useState(null);
      const [showSaleModal, setShowSaleModal] = useState(false);
      const [selectedProductForSale, setSelectedProductForSale] = useState(null);
      const [saleQuantity, setSaleQuantity] = useState(1);
      const [paymentCurrency, setPaymentCurrency] = useState('USD');
      const [notification, setNotification] = useState(null);

      const [prodForm, setProdForm] = useState({
        name: '', sku: '', category: 'Aceites Sintéticos', costPrice: '', sellingPrice: '', stock: '', minStock: '', image: ''
      });

      const fileInputRef = useRef(null);

      const triggerNotification = (message, type = 'success') => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 4000);
      };

      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (error) {
            console.error("Error al autenticar:", error);
            setLoading(false);
          }
        };
        initAuth();

        return onAuthStateChanged(auth, (usr) => {
          setUser(usr);
          if (!usr) setLoading(false);
        });
      }, []);

      useEffect(() => {
        if (!user) return;
        setLoading(true);

        const productsColRef = collection(db, 'artifacts', appId, 'public', 'data', 'products');
        const salesColRef = collection(db, 'artifacts', appId, 'public', 'data', 'sales');

        const unsubscribeProducts = onSnapshot(productsColRef, (snapshot) => {
          setProducts(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
          setLoading(false);
        }, () => setLoading(false));

        const unsubscribeSales = onSnapshot(salesColRef, (snapshot) => {
          const salesList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          salesList.sort((a, b) => new Date(b.date) - new Date(a.date));
          setSales(salesList);
        });

        return () => { unsubscribeProducts(); unsubscribeSales(); };
      }, [user]);

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          if (file.size > 1 * 1024 * 1024) {
            triggerNotification('La imagen supera el límite de 1MB.', 'error');
            return;
          }
          const reader = new FileReader();
          reader.onloadend = () => setProdForm(prev => ({ ...prev, image: reader.result }));
          reader.readAsDataURL(file);
        }
      };

      const stats = useMemo(() => {
        const startOfWeek = new Date();
        startOfWeek.setHours(0, 0, 0, 0);
        startOfWeek.setDate(startOfWeek.getDate() - (startOfWeek.getDay() || 7) + 1);

        const weeklySales = sales.filter(sale => new Date(sale.date) >= startOfWeek);
        const profits = { USD: 0, VES: 0, EUR: 0 };
        const revenues = { USD: 0, VES: 0, EUR: 0 };

        weeklySales.forEach(sale => {
          const cur = sale.currency || 'USD';
          if (profits[cur] !== undefined) {
            profits[cur] += sale.profit || 0;
            revenues[cur] += (sale.sellingPrice * sale.quantity) || 0;
          }
        });

        const lowStockProducts = products.filter(p => p.stock <= p.minStock);
        const totalInventoryValue = products.reduce((sum, p) => sum + (p.costPrice * p.stock), 0);

        return { profits, revenues, lowStockCount: lowStockProducts.length, totalProducts: products.length, totalInventoryValue };
      }, [products, sales]);

      const openAddProductModal = () => {
        setEditingProduct(null);
        setProdForm({ name: '', sku: `GZ-${Math.floor(1000 + Math.random() * 9000)}`, category: 'Aceites Sintéticos', costPrice: '', sellingPrice: '', stock: '', minStock: '4', image: '' });
        setShowProductModal(true);
      };

      const saveProduct = async (e) => {
        e.preventDefault();
        const payload = {
          name: prodForm.name, sku: prodForm.sku, category: prodForm.category,
          costPrice: parseFloat(prodForm.costPrice), sellingPrice: parseFloat(prodForm.sellingPrice),
          stock: parseInt(prodForm.stock), minStock: parseInt(prodForm.minStock), image: prodForm.image || ''
        };

        try {
          if (editingProduct) {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', editingProduct.id), payload);
            triggerNotification('Cambios guardados con éxito.');
          } else {
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'products'), payload);
            triggerNotification('Nuevo producto registrado.');
          }
          setShowProductModal(false);
        } catch (err) {
          triggerNotification('Error al guardar en la nube.', 'error');
        }
      };

      const registerSale = async (e) => {
        e.preventDefault();
        const qty = parseInt(saleQuantity);
        if (qty > selectedProductForSale.stock) return;

        const totalProfit = (selectedProductForSale.sellingPrice - selectedProductForSale.costPrice) * qty;

        try {
          await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'sales'), {
            productId: selectedProductForSale.id, productName: selectedProductForSale.name,
            quantity: qty, costPrice: selectedProductForSale.costPrice, sellingPrice: selectedProductForSale.sellingPrice,
            profit: totalProfit, currency: paymentCurrency, date: new Date().toISOString()
          });

          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', selectedProductForSale.id), {
            stock: selectedProductForSale.stock - qty
          });

          setShowSaleModal(false);
          triggerNotification('Venta registrada con éxito.');
        } catch (err) {
          triggerNotification('Error al procesar transaccion.', 'error');
        }
      };

      const filteredProducts = useMemo(() => {
        return products.filter(p => {
          const matchesSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.sku.toLowerCase().includes(searchQuery.toLowerCase());
          const matchesCategory = categoryFilter === '' || p.category === categoryFilter;
          return matchesSearch && matchesCategory;
        });
      }, [products, searchQuery, categoryFilter]);

      if (loading) {
        return (
          <div className="min-h-screen bg-neutral-950 flex flex-col items-center justify-center">
            <div className="bg-red-600 text-white p-4 rounded-xl font-black text-3xl animate-pulse">GZ</div>
            <p className="mt-4 text-sm font-bold text-neutral-400">Sincronizando Base de Datos...</p>
          </div>
        );
      }

      return (
        <div className="min-h-screen flex flex-col">
          <header className="bg-neutral-900 border-b border-red-600 p-4 sticky top-0 z-40">
            <div className="max-w-7xl mx-auto flex justify-between items-center">
              <div className="flex items-center space-x-3">
                <div className="bg-red-600 text-white px-3 py-1.5 rounded-lg font-black text-xl">GZ</div>
                <div>
                  <h1 className="font-bold text-lg text-white leading-none">GZ LUBRICANTES</h1>
                  <span className="text-[10px] text-emerald-400 font-semibold uppercase tracking-wider">● En Línea</span>
                </div>
              </div>
            </div>
          </header>

          {/* Menú de pestañas para móvil */}
          <div className="flex bg-neutral-900 p-1 border-b border-neutral-800 sticky top-[73px] z-30">
            {['dashboard', 'inventory', 'sales'].map((tab) => (
              <button key={tab} onClick={() => setActiveTab(tab)} className={`flex-1 py-2 text-xs font-bold uppercase rounded-md transition ${activeTab === tab ? 'bg-red-600 text-white' : 'text-neutral-400'}`}>
                {tab === 'dashboard' ? 'Panel' : tab === 'inventory' ? 'Inventario' : 'Ventas'}
              </button>
            ))}
          </div>

          <main className="flex-1 p-4 max-w-7xl w-full mx-auto space-y-6">
            
            {/* VISTA: PANEL */}
            {activeTab === 'dashboard' && (
              <div className="space-y-6">
                <div className="bg-neutral-900 p-4 rounded-xl border border-neutral-800 flex justify-between items-center">
                  <div>
                    <h2 className="text-xl font-black">Panel General</h2>
                    <p className="text-xs text-neutral-400">Métricas acumuladas del inventario.</p>
                  </div>
                  <button onClick={openAddProductModal} className="bg-red-600 text-white font-bold text-xs px-3 py-2 rounded-lg">
                    + Agregar Aceite
                  </button>
                </div>

                {/* Tarjetas de Indicadores */}
                <div className="grid grid-cols-2 gap-3">
                  <div className="bg-neutral-900 p-3 rounded-xl border border-neutral-800">
                    <p className="text-xs text-neutral-400">Modelos en Stock</p>
                    <p className="text-xl font-black text-white">{stats.totalProducts}</p>
                  </div>
                  <div className="bg-neutral-900 p-3 rounded-xl border border-neutral-800">
                    <p className="text-xs text-neutral-400">Bajo Stock (Alerta)</p>
                    <p className="text-xl font-black text-red-500">{stats.lowStockCount}</p>
                  </div>
                </div>

                {/* Ganancias Semanales */}
                <div className="bg-neutral-900 p-4 rounded-xl border border-neutral-800 space-y-3">
                  <h3 className="text-xs font-bold text-red-500 uppercase tracking-wider">Ganancias de la Semana</h3>
                  <div className="grid grid-cols-3 gap-2 text-center">
                    <div className="bg-neutral-950 p-2 rounded-lg"><span className="text-xs text-neutral-400 block">USD</span><span className="font-bold text-emerald-400">${stats.profits.USD.toFixed(1)}</span></div>
                    <div className="bg-neutral-950 p-2 rounded-lg"><span className="text-xs text-neutral-400 block">VES</span><span className="font-bold text-sky-400">Bs{stats.profits.VES.toFixed(1)}</span></div>
                    <div className="bg-neutral-950 p-2 rounded-lg"><span className="text-xs text-neutral-400 block">EUR</span><span className="font-bold text-amber-400">€{stats.profits.EUR.toFixed(1)}</span></div>
                  </div>
                </div>
              </div>
            )}

            {/* VISTA: INVENTARIO */}
            {activeTab === 'inventory' && (
              <div className="space-y-4">
                <input type="text" placeholder="Buscar por nombre o SKU..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full bg-neutral-900 border border-neutral-800 p-3 rounded-xl text-sm focus:outline-none focus:border-red-600" />
                
                <div className="space-y-2">
                  {filteredProducts.map(product => (
                    <div key={product.id} className="bg-neutral-900 p-3 rounded-xl border border-neutral-800 flex justify-between items-center">
                      <div>
                        <h4 className="font-bold text-sm text-white">{product.name}</h4>
                        <p className="text-xs text-neutral-400">SKU: {product.sku} | Cat: {product.category}</p>
                        <div className="flex gap-4 mt-1">
                          <span className="text-xs font-bold text-emerald-400">Venta: ${product.sellingPrice}</span>
                          <span className={`text-xs font-bold ${product.stock <= product.minStock ? 'text-red-500' : 'text-neutral-400'}`}>Cant: {product.stock}</span>
                        </div>
                      </div>
                      <div className="flex flex-col gap-1">
                        <button onClick={() => openSaleModal(product)} className="bg-emerald-600 text-white font-bold text-[11px] px-2.5 py-1 rounded">Vender</button>
                        <button onClick={() => { setEditingProduct(product); setProdForm({ ...product }); setShowProductModal(true); }} className="bg-neutral-800 text-neutral-300 font-bold text-[11px] px-2.5 py-1 rounded">Editar</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* VISTA: HISTORIAL DE VENTAS */}
            {activeTab === 'sales' && (
              <div className="space-y-2">
                <h3 className="font-bold text-sm text-neutral-400 mb-2">Historial de Operaciones</h3>
                {sales.map(sale => {
                  const symbol = CURRENCIES.find(c => c.code === sale.currency)?.symbol || '$';
                  return (
                    <div key={sale.id} className="bg-neutral-900 p-3 rounded-xl border border-neutral-800 flex justify-between items-center text-xs">
                      <div>
                        <p className="font-bold text-white">{sale.productName}</p>
                        <p className="text-neutral-500">{new Date(sale.date).toLocaleDateString()} - {sale.quantity} unds.</p>
                      </div>
                      <div className="text-right">
                        <span className="text-emerald-400 font-bold block">+{symbol}{(sale.sellingPrice * sale.quantity).toFixed(2)}</span>
                        <span className="text-neutral-400 text-[10px]">Ganancia: {symbol}{sale.profit.toFixed(2)}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </main>

          {/* MODAL: PRODUCTO */}
          {showProductModal && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 overflow-y-auto">
              <form onSubmit={saveProduct} className="bg-neutral-900 p-5 rounded-2xl border border-neutral-800 w-full max-w-md space-y-3 my-auto">
                <h3 className="font-black text-lg">{editingProduct ? 'Editar Artículo' : 'Nuevo Artículo'}</h3>
                <div><label className="text-xs text-neutral-400">Nombre</label><input type="text" required value={prodForm.name} onChange={e => setProdForm({...prodForm, name: e.target.value})} className="w-full bg-neutral-950 p-2 rounded border border-neutral-800 text-sm focus:outline-none" /></div>
                <div className="grid grid-cols-2 gap-2">
                  <div><label className="text-xs text-neutral-400">SKU</label><input type="text" required value={prodForm.sku} onChange={e => setProdForm({...prodForm, sku: e.target.value})} className="w-full bg-neutral-950 p-2 rounded border border-neutral-800 text-sm focus:outline-none" /></div>
                  <div><label className="text-xs text-neutral-400">Categoría</label><select value={prodForm.category} onChange={e => setProdForm({...prodForm, category: e.target.value})} className="w-full bg-neutral-950 p-2 rounded border border-neutral-800 text-sm focus:outline-none">{CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                </div>
                <div className="grid grid-cols-2 gap-2">
                  <div><label className="text-xs text-neutral-400">Precio Costo ($)</label><input type="number" step="0.01" required value={prodForm.costPrice} onChange={e => setProdForm({...prodForm, costPrice: e.target.value})} className="w-full bg-neutral-950 p-2 rounded border border-neutral-800 text-sm focus:outline-none" /></div>
                  <div><label className="text-xs text-neutral-400">Precio Venta ($)</label><input type="number" step="0.01" required value={prodForm.sellingPrice} onChange={e => setProdForm({...prodForm, sellingPrice: e.target.value})} className="w-full bg-neutral-950 p-2 rounded border border-neutral-800 text-sm focus:outline-none" /></div>
                </div>
                <div className="grid grid-cols-2 gap-2">
                  <div><label className="text-xs text-neutral-400">Cantidad Inicial</label><input type="number" required value={prodForm.stock} onChange={e => setProdForm({...prodForm, stock: e.target.value})} className="w-full bg-neutral-950 p-2 rounded border border-neutral-800 text-sm focus:outline-none" /></div>
                  <div><label className="text-xs text-neutral-400">Stock Mínimo</label><input type="number" required value={prodForm.minStock} onChange={e => setProdForm({...prodForm, minStock: e.target.value})} className="w-full bg-neutral-950 p-2 r
